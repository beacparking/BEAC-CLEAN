<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Statistics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<h1>Vehicle Statistics</h1>

<form method="GET" class="qr-form">
    <label>Select date</label>
    <input type="date" name="date" value="{{ stats_date.isoformat() }}" required>
    <button type="submit">Show Stats</button>
</form>

{% if stats %}
<div class="qr-box">
    <p><b>Statistics for {{ stats_date }}:</b></p>
    <p>Bhutan trucks: {{ stats.bhutanese }}</p>
    <p>India trucks: {{ stats.indian }}</p>
    <p>Total trucks: {{ stats.total }}</p>
    <p style="margin-top: 15px;">
        <a href="{{ url_for('stats_export', date=stats_date.isoformat()) }}" class="logout" style="display: inline-block;">Download CSV for this date</a>
    </p>
</div>
{% endif %}

<a href="/logout" class="logout">Logout</a>

</body>
</html>
