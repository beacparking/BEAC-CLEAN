<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Vehicle QR System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<a href="/logout" class="logout">Logout</a>

<h1>BEA Vehicle QR system</h1>

<form method="POST" action="/generate">
    <input type="text" placeholder="Vehicle Number" required>
    <input type="date" required>
    <button type="submit">Generate QR</button>
</form>

<hr>

<h3>Export Vehicle Logs (csv)</h3>

<input type="date">
<button>Export Day</button>

<input type="text" placeholder="Month">
<button>Export Month</button>

<select>
    <option>2026</option>
    <option>2025</option>
</select>
<button>Export Year</button>

</body>
</html>
