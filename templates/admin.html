<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Vehicle QR system</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="page">

    <!-- Header -->
    <div class="header">
        <img src="{{ url_for('static', filename='images/logo_left.png') }}" class="logo">
        <h1>BEA Vehicle QR system</h1>
        <img src="{{ url_for('static', filename='images/logo_right.png') }}" class="logo">
    </div>

    <!-- Form Card -->
    <div class="card">
        <form method="POST" action="/admin">

            <input
                type="text"
                name="vehicle_number"
                placeholder="Vehicle Number"
                required
            >

            <input
                type="date"
                name="date"
                required
            >

            <button type="submit">Generate QR</button>
        </form>
    </div>

    <!-- Logout -->
    <a class="logout" href="/logout">Logout</a>

</div>

</body>
</html>
