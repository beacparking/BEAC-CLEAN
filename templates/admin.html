<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Vehicle QR system</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="page">

    <!-- Header -->
    <div class="header">
        <img src="{{ url_for('static', filename='images/logo_left.png') }}" class="logo">
        <h1>BEA Vehicle QR system</h1>
        <img src="{{ url_for('static', filename='images/logo_right.png') }}" class="logo">
    </div>

    <!-- Form -->
    <form method="POST" action="/admin" class="form-box">

        <input
            type="text"
            name="vehicle_number"
            placeholder="Vehicle Number"
            required
        >

        <input
            type="date"
            name="generated_date"
            required
        >

        <button type="submit">
            Generate QR
        </button>

    </form>

    <!-- Logout -->
    <a href="/logout" class="logout">Logout</a>

</div>

</body>
</html>
