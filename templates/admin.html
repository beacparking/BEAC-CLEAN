<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Vehicle QR system</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<!-- Logos -->
<img src="{{ url_for('static', filename='images/left_logo.png') }}" class="logo left-logo">
<img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo right-logo">

<!-- Title -->
<h1 class="title">BEA Vehicle QR system</h1>

<!-- Form -->
<div class="form-container">
    <form method="POST" action="/admin">
        <input type="text" name="vehicle_number" placeholder="Vehicle Number" required>
        <input type="date" name="generated_date" required>
        <button type="submit">Generate QR</button>
    </form>
</div>

<!-- Logout -->
<a href="/logout" class="logout">Logout</a>

</body>
</html>
