<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEAC Vehicle QR System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

<h1>BEAC Vehicle QR system</h1>

<form method="POST" class="qr-form">
    <input type="text" name="vehicle" placeholder="Vehicle Number" required>
    <input type="date" name="date" required>
    <button type="submit">Generate QR</button>
</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if qr %}
<div class="qr-box">
    <p><b>Token:</b> {{ qr.token }}</p>
    <p><b>Vehicle:</b> {{ qr.vehicle }}</p>
    <p><b>Expiry:</b> {{ qr.expiry }}</p>
    <img src="/{{ qr.qr_path }}" width="200">
</div>
{% endif %}

<hr>

<h2>Export CSV</h2>

<div class="export-box">
    <form action="/admin/export/day" method="get">
        <label>Select day</label>
        <input type="date" name="date" required>
        <button type="submit">Export Date</button>
    </form>

    <form action="/admin/export/week" method="get">
        <label>Select Any Date (last 7 days from it)</label>
        <input type="date" name="date" required>
        <button type="submit">Export Date</button>
    </form>

    <form action="/admin/export/month" method="get">
        <label>Select month</label>
        <input type="month" name="month" required>
        <button type="submit">Export Date</button>
    </form>
</div>

<a href="/logout" class="logout">Logout</a>

</body>
</html>
