<!DOCTYPE html>
<html>
<head>
    <title>BEA Vehicle QR System</title>
</head>
<body>

<h2>Generate Vehicle QR</h2>

<form method="POST" action="/generate">
    <input type="text" name="vehicle_number" placeholder="Vehicle Number" required>
    <input type="date" name="date" required>
    <button type="submit">Generate QR</button>
</form>

<hr>

{% if qr %}
    <h3>Token Number: {{ qr.sequence }}</h3>
    <p>Vehicle: {{ qr.vehicle_number }}</p>
    <p>Expires: {{ qr.expires_date }}</p>
    <img src="/{{ qr.qr_image }}" width="200">
{% endif %}

<br>
<a href="/logout">Logout</a>

</body>
</html>
