<!DOCTYPE html>
<html>
<head>
    <title>BEAC Admin</title>
</head>
<body>

<h2>BEAC Vehicle QR System</h2>

<form method="POST">
    <input type="text" name="vehicle" placeholder="Vehicle Number" required>
    <input type="date" name="date" required>
    <button type="submit">Generate QR</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if qr %}
<hr>
<h3>QR Generated</h3>
<p><b>Token:</b> {{ qr.token }}</p>
<p><b>Vehicle:</b> {{ qr.vehicle }}</p>
<p><b>Expiry:</b> {{ qr.expiry }}</p>

<img src="/{{ qr.qr_path }}" width="200">
<br>
<a href="{{ qr.qr_url }}">{{ qr.qr_url }}</a>
{% endif %}

<hr>

<h3>📤 Export CSV</h3>

<a href="/admin/export/daily"><button>Export Daily</button></a>
<a href="/admin/export/weekly"><button>Export Weekly</button></a>
<a href="/admin/export/monthly"><button>Export Monthly</button></a>

<hr>
<a href="/logout">Logout</a>

</body>
</html>
