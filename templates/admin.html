<!DOCTYPE html>
<html>
<head>
    <title>BEAC Admin</title>
</head>
<body>

<h2>BEAC Vehicle QR System</h2>

<form method="POST">
    <input type="text" name="vehicle" placeholder="Vehicle Number" required>
    <input type="date" name="date" required>
    <button type="submit">Generate QR</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if qr %}
<hr>
<h3>QR Generated</h3>
<p><b>Token:</b> {{ qr.token }}</p>
<p><b>Vehicle:</b> {{ qr.vehicle }}</p>
<p><b>Expiry:</b> {{ qr.expiry }}</p>

<img src="/{{ qr.qr_path }}" width="200">
<br>
<a href="{{ qr.qr_url }}">{{ qr.qr_url }}</a>
{% endif %}

<hr>

<h3>📤 Export CSV</h3>

<form action="/admin/export/day" method="get">
    <label>Select Day:</label><br>
    <input type="date" name="date" required>
    <button type="submit">Export Day</button>
</form>

<br>

<form action="/admin/export/week" method="get">
    <label>Select Any Date (last 7 days from it):</label><br>
    <input type="date" name="date" required>
    <button type="submit">Export Last 7 Days</button>
</form>

<br>

<form action="/admin/export/month" method="get">
    <label>Select Month:</label><br>
    <input type="month" name="month" required>
    <button type="submit">Export Month</button>
</form>

<hr>
<a href="/logout">Logout</a>

</body>
</html>
