<!DOCTYPE html>
<html>
<head>
    <title>BEAC Vehicle QR System</title>
</head>
<body>

<h2>🚗 BEAC Vehicle QR System</h2>
<a href="/logout">Logout</a>

<hr>

<form method="POST">
    <input type="text" name="vehicle" placeholder="Vehicle Number" required><br><br>
    <input type="date" name="expiry" required><br><br>
    <button type="submit">Generate QR</button>
</form>

{% if message %}
<p><b>{{ message }}</b></p>
{% endif %}

{% if qr_base64 %}
<hr>
<h3>QR Generated</h3>

<img src="data:image/png;base64,{{ qr_base64 }}" width="250"><br><br>

<b>Token:</b> {{ token }}<br>
<a href="/verify/{{ token }}" target="_blank">Open Verify Page</a>
{% endif %}

<hr>

<h3>📊 Export Vehicle Logs</h3>

<a href="/export">Export All Logs (CSV)</a>

</body>
</html>
