<h2>BEAC Vehicle QR System</h2>
<a href="/logout">Logout</a>

<form method="post">
  <input name="vehicle" placeholder="Vehicle Number" required><br>
  <input type="date" name="expiry" required><br>
  <button type="submit">Generate QR</button>
</form>

{% if qr %}
<h3>QR Generated</h3>
<img src="/static/qr.png"><br>
<a href="{{ qr }}">{{ qr }}</a>
{% endif %}

<hr>

<h3>Export Logs</h3>

<form action="/export/day">
  <input type="date" name="date" required>
  <button>Export Day</button>
</form>

<form action="/export/month">
  <input type="month" name="month" required>
  <button>Export Month</button>
</form>

<form action="/export/year">
  <input type="number" name="year" placeholder="2026" required>
  <button>Export Year</button>
</form>
