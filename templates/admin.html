<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Vehicle QR system</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
    <img src="{{ url_for('static', filename='images/left_logo.png') }}" class="logo left">

    <h1>BEA Vehicle QR system</h1>

    <img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo right">
</div>

<!-- FORM AREA -->
<div class="center-area">

    <form method="POST" action="{{ url_for('generate_qr') }}" class="qr-form">

        <input
            type="text"
            name="vehicle"
            placeholder="Vehicle Number"
            required
        >

        <input
            type="date"
            name="date"
            required
        >

        <button type="submit">Generate QR</button>

    </form>

</div>

<!-- LOGOUT -->
<div class="logout">
    <a href="{{ url_for('logout') }}">Logout</a>
</div>

</body>
</html>
