<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download vehicle CSV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="page">

<h1>Download vehicle CSV</h1>

{% if not logged_in %}
    <form method="POST" class="qr-form">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
        {% if login_error %}<p class="error">{{ login_error }}</p>{% endif %}
        <button type="submit">Login</button>
    </form>
{% else %}
    <form method="GET" action="{{ url_for('verify_export_csv') }}" class="qr-form">
        <label>Select date</label>
        <input type="date" name="date" required>
        <div class="checkbox-group">
            <label><input type="checkbox" name="bhutan" value="1"> Bhutan vehicles</label>
            <label><input type="checkbox" name="indian" value="1"> Indian vehicles</label>
        </div>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <button type="submit">Download CSV</button>
    </form>
    <p class="verify-csv-note">CSV contains: Serial number, Vehicle number, Type of load, Amount.</p>
    <a href="/logout" class="logout">Logout</a>
{% endif %}

</div>
</body>
</html>
