{% if status == "VALID" %}
    <h1 style="color: green;">✅ VALID</h1>
    <p><strong>Vehicle:</strong> {{ vehicle }}</p>
    <p><strong>Expires:</strong> {{ expires }}</p>

{% elif status == "EXPIRED" %}
    <h1 style="color: red;">❌ EXPIRED</h1>
    <p><strong>Vehicle:</strong> {{ vehicle }}</p>

{% else %}
    <h1 style="color: red;">❌ INVALID QR</h1>
{% endif %}
