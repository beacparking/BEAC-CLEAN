<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Monthly expenses login — BEA Parking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<header class="app-header app-header--simple">
    <div class="app-header-left">
        <img src="{{ url_for('static', filename='images/right_logo.png') }}" alt="Bhutan Exporters Association" class="app-header-logo" width="44" height="44">
        <div class="app-title-group">
            <span class="app-title">BEA Parking</span>
            <span class="app-subtitle">Monthly expenses</span>
        </div>
    </div>
    <a href="{{ url_for('login') }}" class="header-link">Main login</a>
</header>

<div class="page">

<h1>Monthly expenses login</h1>
<p class="page-lead">Sign in to track monthly operating costs (salary, utilities, software, maintenance, water).</p>

<div class="dash-card">
    <form method="POST" class="qr-form">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
        {% if login_error %}<p class="error">{{ login_error }}</p>{% endif %}
        <button type="submit">Login</button>
    </form>
</div>

</div>
</body>
</html>
