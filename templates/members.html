<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Members</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="page">

<h1>BEA Members</h1>

<form method="GET" class="qr-form">
    <label>Select date</label>
    <input type="date" name="date" value="{{ members_date.isoformat() }}" required>
    <button type="submit">Show</button>
</form>

<div class="qr-box">
    <div class="stats-summary">
        <div>
            <div class="stats-summary-label">Bhutan trucks</div>
            <div class="stats-summary-value">{{ bhutanese }}</div>
        </div>
        <div>
            <div class="stats-summary-label">India trucks</div>
            <div class="stats-summary-value">{{ indian }}</div>
        </div>
    </div>
    <div class="stats-summary" style="margin-top: 16px;">
        <div>
            <div class="stats-summary-label">Total amount collected (Nu)</div>
            <div class="stats-summary-value">{{ "%.2f"|format(amount_total) }}</div>
        </div>
        <div>
            <div class="stats-summary-label">Amount from Bhutanese (Nu)</div>
            <div class="stats-summary-value">{{ "%.2f"|format(amount_bhutanese) }}</div>
        </div>
        <div>
            <div class="stats-summary-label">Amount from Indian (Nu)</div>
            <div class="stats-summary-value">{{ "%.2f"|format(amount_indian) }}</div>
        </div>
    </div>
</div>

<a href="/logout" class="logout">Logout</a>

</div>
</body>
</html>
