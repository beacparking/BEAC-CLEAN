<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #063a3a;
            color: #ffffff;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* LEFT SIDE */
        .left {
            width: 50%;
            padding: 40px;
            position: relative;
        }

        .left img.logo-left {
            width: 130px;
        }

        .title {
            margin-top: 20px;
            font-size: 28px;
            font-weight: 600;
        }

        /* CENTER LINE */
        .divider {
            width: 1px;
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* RIGHT SIDE */
        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 320px;
        }

        .login-box h2 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 500;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: rgba(255,255,255,0.15);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .left, .right {
                width: 100%;
            }
            .divider {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <img src="{{ url_for('static', filename='logo_left.png') }}" class="logo-left" alt="Logo">
        <div class="title">
            Bhutan Exporters Association<br>
            Phuentsholing Regional Chapter
        </div>
    </div>

    <!-- CENTER LINE -->
    <div class="divider"></div>

    <!-- RIGHT -->
    <div class="right">
        <div class="login-box">
            <h2>BEA parking</h2>

            <form method="POST">
                <input type="text" name="username" placeholder="USERNAME" required>
                <input type="password" name="password" placeholder="PASSWORD" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
