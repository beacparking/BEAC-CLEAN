<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="page">

    <!-- LEFT SECTION -->
    <div class="left">
        <div class="logos">
            <img src="{{ url_for('static', filename='images/left_logo.png') }}" class="logo left-logo">
            <img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo right-logo">
        </div>

        <h1>
            Bhutan Exporters Association<br>
            Phuentsholing Regional Chapter
        </h1>
    </div>

    <!-- CENTER DIVIDER -->
    <div class="divider"></div>

    <!-- RIGHT SECTION -->
    <div class="right">
        <h2>BEA parking</h2>

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="USERNAME" required>
            <input type="password" name="password" placeholder="PASSWORD" required>
            <button type="submit">Login</button>
        </form>
    </div>

</div>

</body>
</html>
