<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<!-- HEADER -->
<div class="header">
    <img src="{{ url_for('static', filename='images/left_logo.png') }}" class="logo left">
    <div class="title">
        <h1>Bhutan Exporters Association</h1>
        <h2>Phuentsholing Regional Chapter</h2>
    </div>
    <img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo right">
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <!-- LEFT IMAGE -->
    <div class="left-section">
        <img src="{{ url_for('static', filename='images/king.png') }}" class="hero">
    </div>

    <!-- LOGIN BOX -->
    <div class="right-section">
        <h3>BEA parking</h3>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="USERNAME" required>
            <input type="password" name="password" placeholder="PASSWORD" required>
            <button type="submit">Login</button>
        </form>
    </div>
</div>

</body>
</html>
