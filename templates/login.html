<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>

    <!-- FORCE CSS RELOAD -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}?v=3">

</head>
<body>

<div class="page">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <img src="{{ url_for('static', filename='image/left_logo.png') }}" class="logo left-logo">

        <h1>
            Bhutan Exporters Association<br>
            Phuentsholing Regional Chapter
        </h1>
    </div>

    <!-- CENTER LINE -->
    <div class="divider"></div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <img src="{{ url_for('static', filename='image/right_logo.png') }}" class="logo right-logo">

        <h2>BEA parking</h2>

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="USERNAME" required>
            <input type="password" name="password" placeholder="PASSWORD" required>
            <button type="submit">Login</button>
        </form>
    </div>

</div>

</body>
</html>
