<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>
<div class="page">

    <!-- TOP HEADER -->
    <div class="header">
        <img src="{{ url_for('static', filename='images/left_logo.png') }}" class="logo left">
        <h1>
            Bhutan Exporters Association<br>
            Phuentsholing Regional Chapter
        </h1>
        <img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo right">
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <!-- LEFT IMAGE -->
        <div class="image-panel">
            <img src="{{ url_for('static', filename='images/person.png') }}" alt="Person">
        </div>

        <!-- RIGHT LOGIN -->
        <div class="login-panel">
            <h2>BEA parking</h2>

            <form method="POST" action="/login">
                <input type="text" name="username" placeholder="USERNAME" required>
                <input type="password" name="password" placeholder="PASSWORD" required>
                <button type="submit">Login</button>
            </form>
        </div>

    </div>
</div>
</body>
</html>
