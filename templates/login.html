<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>BEA Parking – Bhutan Exporters Association | Phuentsholing</title>
    <meta name="description" content="BEA Parking – Vehicle QR system for Bhutan Exporters Association, Phuentsholing Regional Chapter. Login for admin and vehicle statistics.">
    <link rel="canonical" href="{{ request.url_root.rstrip('/') }}{{ url_for('login') }}">
    <!-- Open Graph / Google -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="BEA Parking – Bhutan Exporters Association">
    <meta property="og:description" content="Vehicle QR system for Bhutan Exporters Association, Phuentsholing Regional Chapter.">
    <meta property="og:url" content="{{ request.url_root.rstrip('/') }}{{ url_for('login') }}">
    <meta name="google-site-verification" content="8SIvsYorYGrqQCMNqY3V3L7WSVEsWj7z0kzliNVr_UI" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

    <!-- HEADER -->
    <div class="header">
       

        <div class="header-text">
            <h1>Bhutan Exporters Association</h1>
            <h2>Phuentsholing Regional Chapter</h2>
        </div>

    <img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo"> 
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- LEFT IMAGE -->
        <div class="left">
            <!-- 🔴 FIX IS HERE: person.png -->
            <img src="{{ url_for('static', filename='images/person.png') }}" class="person">
        </div>

        <!-- LOGIN -->
        <div class="right">
            <form method="POST" class="login-box">
                <h3>BEA parking</h3>

                <input type="text" name="username" placeholder="USERNAME" required>
                <input type="password" name="password" placeholder="PASSWORD" required>

                <button type="submit">Login</button>

                {% if error %}
                    <p class="error">{{ error }}</p>
                {% endif %}
            </form>
        </div>

    </div>

</body>
</html>
