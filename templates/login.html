<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="page">

    <!-- TOP BAR -->
    <div class="top-bar">
        <img src="{{ url_for('static', filename='image/left_logo.png') }}" class="logo left">
        <div class="title">
            <h1>Bhutan Exporters Association</h1>
            <h2>Phuentsholing Regional Chapter</h2>
        </div>
        <img src="{{ url_for('static', filename='image/right_logo.png') }}" class="logo right">
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <!-- LEFT IMAGE -->
        <div class="left-image">
            <img src="{{ url_for('static', filename='image/person.png') }}">
        </div>

        <!-- RIGHT LOGIN -->
        <div class="login-box">
            <h3>BEA parking</h3>

            <form method="POST" action="/login">
                <input type="text" name="username" placeholder="USERNAME" required>
                <input type="password" name="password" placeholder="PASSWORD" required>
                <button type="submit">Login</button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
