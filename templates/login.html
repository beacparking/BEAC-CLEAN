<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <div class="header">
            <img src="{{ url_for('static', filename='images/left_logo.png') }}" class="logo">
            <h1>
                Bhutan Exporters Association<br>
                Phuentsholing Regional Chapter
            </h1>
            <img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo">
        </div>
    </div>

    <!-- DIVIDER -->
    <div class="divider"></div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">
        <h2>BEA parking</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="USERNAME" required>
            <input type="password" name="password" placeholder="PASSWORD" required>
            <button type="submit">Login</button>
        </form>
    </div>

</div>

</body>
</html>
