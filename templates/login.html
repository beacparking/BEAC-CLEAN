<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

    <!-- HEADER -->
    <div class="header">
       

        <div class="header-text">
            <h1>Bhutan Exporters Association</h1>
            <h2>Phuentsholing Regional Chapter</h2>
        </div>

    <img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo"> 
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- LEFT IMAGE -->
        <div class="left">
            <!-- 🔴 FIX IS HERE: person.png -->
            <img src="{{ url_for('static', filename='images/person.png') }}" class="person">
        </div>

        <!-- LOGIN -->
        <div class="right">
            <form method="POST" class="login-box">
                <h3>BEA parking</h3>

                <input type="text" name="username" placeholder="USERNAME" required>
                <input type="password" name="password" placeholder="PASSWORD" required>

                <button type="submit">Login</button>

                {% if error %}
                    <p class="error">{{ error }}</p>
                {% endif %}
            </form>
        </div>

    </div>

</body>
</html>
