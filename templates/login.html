<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- IMPORTANT: Flask static path -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">
        <div class="logos">
            <img src="{{ url_for('static', filename='images/bea-logo-left.png') }}" alt="Left Logo">
            <img src="{{ url_for('static', filename='images/bea-logo-right.png') }}" alt="Right Logo">
        </div>

        <h1>
            Bhutan Exporters Association<br>
            Phuentsholing Regional Chapter
        </h1>
    </div>

    <!-- DIVIDER -->
    <div class="divider"></div>

    <!-- RIGHT PANEL -->
    <div class="right">
        <h2>BEA parking</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="USERNAME" required>
            <input type="password" name="password" placeholder="PASSWORD" required>
            <button type="submit">Login</button>
        </form>
    </div>

</div>

</body>
</html>
