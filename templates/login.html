<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #062b2b; /* dark teal */
            font-family: Arial, sans-serif;
            color: white;
        }

        .wrapper {
            display: flex;
            height: 100%;
        }

        .left {
            flex: 1;
        }

        .divider {
            width: 2px;
            background: rgba(255,255,255,0.4);
            margin: 80px 0;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 320px;
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid white;
            color: white;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }

        button:hover {
            background: rgba(255,255,255,0.15);
        }

        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }
            .divider {
                display: none;
            }
            .left {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left"></div>

    <div class="divider"></div>

    <div class="right">
        <div class="login-box">
            <h2>BEA parking</h2>

            <form method="POST">
                <input type="text" name="username" placeholder="USERNAME" required>
                <input type="password" name="password" placeholder="PASSWORD" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
