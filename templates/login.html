<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEA Parking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="container">

    <div class="top">
        <img src="{{ url_for('static', filename='images/left_logo.png') }}" class="logo">
        <div class="title">
            Bhutan Exporters Association<br>
            Phuentsholing Regional Chapter
        </div>
        <img src="{{ url_for('static', filename='images/right_logo.png') }}" class="logo">
    </div>

    <div class="content">
        <div class="left">
            <img src="{{ url_for('static', filename='images/person.png') }}" class="person">
        </div>

        <div class="right">
            <h2>BEA parking</h2>

            <form method="POST" action="/login">
                <input type="text" name="username" placeholder="USERNAME" required>
                <input type="password" name="password" placeholder="PASSWORD" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
