<!DOCTYPE html>
<html>
<head>
    <title>BEAC Vehicle QR System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }
        img {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            background: white;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>🚗 BEAC Vehicle QR System</h2>

<form method="POST">
    <input type="text" name="vehicle_no" placeholder="Enter Vehicle Number" required>
    <br>
    <input type="date" name="expiry_date" required>
    <br>
    <button type="submit">Generate QR</button>
</form>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

{% if qr_file %}
    <h3>QR Generated</h3>
    <img src="{{ url_for('static', filename='qr/' + qr_file) }}" width="250">
{% endif %}

</body>
</html>
