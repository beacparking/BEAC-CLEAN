<!DOCTYPE html>
<html>
<head>
    <title>BEAC Vehicle Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background:#f7f7f7;
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .card {
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            width:320px;
            text-align:center;
        }
        .status {
            font-weight:bold;
            font-size:18px;
            margin-top:10px;
        }
        .warning {
            margin-top:10px;
            font-size:14px;
            color:#b85c00;
        }
        .footer {
            margin-top:15px;
            font-size:12px;
            color:#777;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 BEAC Vehicle Verification</h2>

    <p><b>Vehicle Number:</b><br>{{ vehicle }}</p>
    <p><b>Expiry Date:</b><br>{{ expiry }}</p>

    <div class="status" style="color:{{ color }}">
        Status: {{ status }}
    </div>

    {% if warning %}
    <div class="warning">{{ warning }}</div>
    {% endif %}

    <div class="footer">
        QR Version: {{ version }}<br>
        Verified by BEAC System
    </div>
</div>

</body>
</html>
