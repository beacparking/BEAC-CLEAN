<!DOCTYPE html>
<html>
<head>
    <title>BEAC Vehicle QR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family:Arial; text-align:center; padding:30px;">

<h2>🚗 BEAC Vehicle QR System</h2>

<form method="POST" action="/generate">
    <input
        type="text"
        name="vehicle_number"
        placeholder="Enter Vehicle Number"
        required
        style="padding:10px; width:220px;"
    ><br><br>

    <input
        type="date"
        name="expiry_date"
        required
        style="padding:10px; width:220px;"
    ><br><br>

    <button type="submit" style="padding:10px 20px;">
        Generate QR
    </button>
</form>

{% if qr_image %}
    <h3>📷 Generated QR</h3>
    <img src="{{ qr_image }}" width="250">
    <p>Scan this QR to verify vehicle</p>
{% endif %}

</body>
</html>
