<!DOCTYPE html>
<html>
<head>
    <title>BEAC Vehicle QR System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background:#f7f7f7;
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .card {
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            width:320px;
            text-align:center;
        }
        input, button {
            width:100%;
            padding:10px;
            margin-top:10px;
            font-size:16px;
        }
        button {
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        img {
            margin-top:15px;
            width:200px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 BEAC Vehicle QR System</h2>

    <form method="POST">
        <input type="text" name="vehicle" placeholder="Vehicle Number" required>
        <input type="date" name="expiry" required>
        <button type="submit">Generate QR</button>
    </form>

    {% if qr_file %}
        <img src="/{{ qr_file }}">
    {% endif %}
</div>

</body>
</html>
