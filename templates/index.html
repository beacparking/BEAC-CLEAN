<!DOCTYPE html>
<html>
<head>
    <title>BEAC Vehicle QR System</title>
</head>
<body>
    <h2>BEAC Vehicle QR System</h2>
    <a href="/logout">Logout</a>
    <br><br>

    <form method="POST">
        <input type="text" name="vehicle" placeholder="Vehicle Number" required><br><br>
        <input type="date" name="expiry" required><br><br>
        <button type="submit">Generate QR</button>
    </form>

    {% if qr_image %}
        <h3>QR Generated</h3>
        <img src="data:image/png;base64,{{ qr_image }}" width="200"><br>
        <a href="{{ qr_url }}" target="_blank">{{ qr_url }}</a>
    {% endif %}
</body>
</html>
